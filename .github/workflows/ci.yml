name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Cache MuJoCo for check (includes piper-physics)
      - name: Cache MuJoCo
        uses: actions/cache@v3
        with:
          path: ~/.local/lib/mujoco
          key: mujoco-${{ runner.os }}-3.3.7

      # Setup MuJoCo environment for check
      - name: Setup MuJoCo Environment
        shell: bash
        run: |
          # Export MuJoCo environment variables to subsequent steps
          just _mujoco_download >> $GITHUB_ENV

      - name: Check code
        run: just check

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Cache MuJoCo for clippy-all (includes piper-physics)
      - name: Cache MuJoCo
        uses: actions/cache@v3
        with:
          path: ~/.local/lib/mujoco
          key: mujoco-${{ runner.os }}-3.3.7

      # Setup MuJoCo environment for clippy-all
      - name: Setup MuJoCo Environment
        shell: bash
        run: |
          # Export MuJoCo environment variables to subsequent steps
          just _mujoco_download >> $GITHUB_ENV

      # Run clippy with hardware backends and full features (including piper-physics)
      - name: Clippy check (hardware mode)
        run: just clippy-all

      # Run clippy with mock mode (library code only, no hardware)
      - name: Clippy check (mock mode)
        run: just clippy-mock

  test:
    name: Test (Unit)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}

      # ✅ 安装 just 命令运行器
      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      # ✅ 缓存 MuJoCo 安装（路径与 justfile 严格一致）
      - name: Cache MuJoCo
        uses: actions/cache@v3
        with:
          path: |
            ~/.local/lib/mujoco                    # Linux
            ~/Library/Frameworks/mujoco.framework   # macOS
            ~\AppData\Local\mujoco                 # Windows
          key: mujoco-${{ runner.os }}-3.3.7

      # ✅ 设置 MuJoCo 环境（复用 justfile 逻辑）
      # 将 _mujoco_download 的输出写入 $GITHUB_ENV
      - name: Setup MuJoCo Environment
        shell: bash
        run: |
          # _mujoco_download 输出: export MUJOCO_DYNAMIC_LINK_DIR=...
          # 写入 $GITHUB_ENV 使后续 step 可以读取环境变量
          just _mujoco_download >> $GITHUB_ENV

      - name: Setup vcan0 (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo modprobe vcan || echo "Warning: vcan module not available, tests will be skipped"
          sudo ip link add dev vcan0 type vcan || echo "Warning: Failed to create vcan0, tests will be skipped"
          sudo ip link set up vcan0 || echo "Warning: Failed to bring up vcan0, tests will be skipped"

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ✅ 运行测试（环境变量已通过 $GITHUB_ENV 传递）
      - name: Run unit tests
        run: just test

      - name: Run doctests
        run: cargo test --doc

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-docs

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Cache MuJoCo for docs (includes piper-physics)
      - name: Cache MuJoCo
        uses: actions/cache@v3
        with:
          path: ~/.local/lib/mujoco
          key: mujoco-${{ runner.os }}-3.3.7

      # Setup MuJoCo environment for docs
      - name: Setup MuJoCo Environment
        shell: bash
        run: |
          # Export MuJoCo environment variables to subsequent steps
          just _mujoco_download >> $GITHUB_ENV

      - name: Build documentation
        run: just doc

      - name: Check documentation links
        run: just doc-check
